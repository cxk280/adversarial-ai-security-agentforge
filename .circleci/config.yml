# CircleCI pipeline for the AgentForge Adversarial AI Security Platform.
#
# Mirrors the W2 agentforge repo's dev → qa → prod pattern (see
# ../agentforge/.circleci/config.yml). Master push triggers dev verification.
# qa and prod promotions are manual approval gates (hold-qa, hold-prod) that
# push HEAD onto the qa or prod branch via the GitHub App installation
# token — same bot-only push isolation as W2 (memory:
# project_bot_only_push_isolation). Each promotion is tagged
# <env>-YYYY-MM-DD-N for audit (memory: project_env_branches_to_tags).
#
# The Railway services watch the master / qa / prod branches and auto-
# deploy on push. Railway cannot watch tags, so the branch is the deploy
# ref and the tag is audit-only.
#
# What this pipeline does NOT do that the W2 one does:
#   - Promote the OpenEMR PHP side (we're a separate app)
#   - Run smoke against an OpenEMR endpoint
#   - Run a 25-case eval suite (we run our own smoke against our own API)
#
# See TESTING.md for the full test matrix this pipeline executes.

version: 2.1

orbs:
  node: circleci/node@5

# ─── Executors ──────────────────────────────────────────────────────────
executors:
  python:
    docker:
      - image: cimg/python:3.13
    resource_class: small
  python-with-db:
    docker:
      - image: cimg/python:3.13
      - image: cimg/postgres:16.4
        environment:
          POSTGRES_USER: adversary
          POSTGRES_PASSWORD: adversary
          POSTGRES_DB: adversary_test
    resource_class: small
  node:
    docker:
      - image: cimg/node:lts
    resource_class: small
  playwright:
    docker:
      - image: mcr.microsoft.com/playwright:v1.49.0-noble
    resource_class: medium

# ─── Reusable commands ──────────────────────────────────────────────────
commands:
  promote-to-env-branch:
    description: |
      Push HEAD onto the target env branch (qa / prod) AND tag it
      <env>-YYYY-MM-DD-N for audit. Pattern lifted verbatim from the W2
      agentforge repo. Auth uses a GitHub App installation token — the
      only identity allowed to push qa / prod under branch protection.
    parameters:
      env_branch:
        type: string
    steps:
      - checkout
      - run:
          name: Mint GitHub App installation token
          command: |
            for var in GITHUB_APP_ID GITHUB_APP_PRIVATE_KEY GITHUB_APP_INSTALLATION_ID; do
              if [ -z "$(eval echo \$$var)" ]; then
                echo "✗ $var not set — cannot promote." >&2
                exit 1
              fi
            done
            pip install --quiet 'PyJWT[crypto]'
            TOKEN=$(python3 scripts/mint-github-installation-token.py)
            if [ -z "$TOKEN" ]; then
              echo "✗ Token mint returned empty." >&2
              exit 1
            fi
            echo "export GH_INSTALLATION_TOKEN=$TOKEN" >> "$BASH_ENV"
      - run:
          name: Push HEAD → << parameters.env_branch >>
          command: |
            git push \
              "https://x-access-token:${GH_INSTALLATION_TOKEN}@github.com/cxk280/adversarial-ai-security-agentforge.git" \
              "${CIRCLE_SHA1}:refs/heads/<< parameters.env_branch >>"
      - run:
          name: Tag as << parameters.env_branch >>-YYYY-MM-DD-N
          command: |
            ENV="<< parameters.env_branch >>"
            TODAY=$(date -u +%Y-%m-%d)
            AUTH_URL="https://x-access-token:${GH_INSTALLATION_TOKEN}@github.com/cxk280/adversarial-ai-security-agentforge.git"
            EXISTING=$(git ls-remote --tags "$AUTH_URL" \
              | grep -cE "refs/tags/${ENV}-${TODAY}-[0-9]+\$" \
              || true)
            N=$((EXISTING + 1))
            TAG="${ENV}-${TODAY}-${N}"
            git -c user.email="ci@adversarial.local" \
                -c user.name="Adversarial CI Promoter" \
                tag -a "${TAG}" "${CIRCLE_SHA1}" \
                -m "Promote ${CIRCLE_SHA1:0:7} → ${ENV}"
            git push "$AUTH_URL" "refs/tags/${TAG}"

  wait-for-adversary-sha:
    description: |
      Poll the deployed adversary-agent's /version endpoint until
      git_commit_sha matches $CIRCLE_SHA1. Railway auto-redeploys after
      branch push, but it takes 1-3 min to roll the container.
    parameters:
      base_url:
        type: string
    steps:
      - run:
          name: Wait for SHA at << parameters.base_url >>
          command: |
            DEADLINE=$(( $(date +%s) + 240 ))
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              LIVE=$(curl -fsS "<< parameters.base_url >>/version" \
                | jq -r '.git_commit_sha' 2>/dev/null || echo "")
              if [ "$LIVE" = "$CIRCLE_SHA1" ]; then
                echo "✓ Deployed SHA matches: $LIVE"
                exit 0
              fi
              echo "  Waiting — deployed: ${LIVE:-?}  want: ${CIRCLE_SHA1:0:7}…"
              sleep 8
            done
            echo "✗ Timed out waiting for SHA $CIRCLE_SHA1 at << parameters.base_url >>"
            exit 1

  install-python-deps:
    description: pip-install requirements.txt + dev deps
    steps:
      - run:
          name: pip install
          command: |
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-asyncio pytest-cov httpx
            # PyYAML and requests already in requirements.txt

# ─── Jobs ───────────────────────────────────────────────────────────────
jobs:
  # ── Unit + lint
  python-unit-test:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run:
          name: pytest tests/unit + tests/lint
          command: pytest tests/unit tests/lint -v --tb=short

  # ── API integration test (needs Postgres side-car)
  api-integration-test:
    executor: python-with-db
    steps:
      - checkout
      - install-python-deps
      - run:
          name: Wait for Postgres
          command: |
            until pg_isready -h localhost -U adversary; do sleep 1; done
      - run:
          name: pytest tests/integration
          command: |
            export DATABASE_URL="postgresql://adversary:adversary@localhost:5432/adversary_test"
            pytest tests/integration -v --tb=short

  # ── Authz / self-attack probes
  authz-test:
    executor: python-with-db
    steps:
      - checkout
      - install-python-deps
      - run: pytest tests/integration/test_authz.py -v --tb=short

  # ── Smoke campaign (stubbed target, no LLM calls)
  smoke-campaign:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run: pytest tests/smoke/test_smoke_campaign.py -v --tb=short

  # ── UI unit (Vitest)
  ui-unit-test:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          app-dir: ui
          pkg-manager: npm
      - run:
          name: npm run test (Vitest)
          working_directory: ui
          command: npm run test -- --run

  # ── Architecture drift linter
  arch-drift-lint:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run: pytest tests/lint/test_arch_drift.py -v --tb=short

  # ── Red Team smoke — REAL RunPod call (~$0.005)
  red-team-smoke:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run:
          name: 5-seed smoke against RunPod
          command: |
            if [ -z "$RUNPOD_API_KEY" ] || [ -z "$RUNPOD_ENDPOINT" ]; then
              echo "✗ RUNPOD_* env vars missing — see CI project settings"
              exit 1
            fi
            pytest tests/smoke/test_red_team_runpod.py -v --tb=short

  # ── Judge golden set — REAL Haiku call (~$0.20 across 100 cases)
  judge-golden-set:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run:
          name: 100-case golden set vs current Judge rubric
          command: |
            if [ -z "$ANTHROPIC_API_KEY" ]; then
              echo "✗ ANTHROPIC_API_KEY missing"
              exit 1
            fi
            pytest tests/golden/judge/test_golden.py -v --tb=short

  # ── End-to-end against deployed target (qa or prod)
  e2e-against-deployed:
    executor: python
    parameters:
      base_url:
        type: string
    steps:
      - checkout
      - install-python-deps
      - wait-for-adversary-sha:
          base_url: << parameters.base_url >>
      - run:
          name: 5-attack smoke campaign via real API
          command: |
            export ADVERSARY_BASE_URL="<< parameters.base_url >>"
            pytest tests/smoke/test_e2e_deployed.py -v --tb=short

  # ── Playwright E2E (nightly only)
  playwright-e2e:
    executor: playwright
    steps:
      - checkout
      - node/install-packages:
          app-dir: ui
          pkg-manager: npm
      - run:
          name: Playwright
          working_directory: ui
          command: npx playwright test --reporter=line

  # ── Promotions
  promote-qa:
    executor: python
    steps:
      - promote-to-env-branch:
          env_branch: qa

  promote-prod:
    executor: python
    steps:
      - promote-to-env-branch:
          env_branch: prod

# ─── Workflows ──────────────────────────────────────────────────────────
workflows:
  build-test-deploy:
    jobs:
      # Always: fast unit/lint/integration gate on every push
      - python-unit-test
      - api-integration-test
      - authz-test
      - smoke-campaign:
          requires: [python-unit-test]
      - ui-unit-test
      - arch-drift-lint

      # Dev verification (only on master; Railway auto-deploys master)
      - e2e-against-deployed:
          name: e2e-dev
          base_url: "https://adversary-agent-dev.up.railway.app"
          requires:
            - python-unit-test
            - api-integration-test
            - authz-test
            - smoke-campaign
            - ui-unit-test
            - arch-drift-lint
          filters: { branches: { only: master } }

      # QA gate — manual approval after dev verification + paid LLM tests
      - red-team-smoke:
          requires: [e2e-dev]
          filters: { branches: { only: master } }
      - judge-golden-set:
          requires: [e2e-dev]
          filters: { branches: { only: master } }
      - hold-qa:
          type: approval
          requires: [red-team-smoke, judge-golden-set]
          filters: { branches: { only: master } }

      # QA promotion
      - promote-qa:
          requires: [hold-qa]
          filters: { branches: { only: master } }
      - e2e-against-deployed:
          name: e2e-qa
          base_url: "https://adversary-agent-qa.up.railway.app"
          requires: [promote-qa]
          filters: { branches: { only: master } }

      # Prod gate — manual approval after qa verification
      - hold-prod:
          type: approval
          requires: [e2e-qa]
          filters: { branches: { only: master } }

      # Prod promotion
      - promote-prod:
          requires: [hold-prod]
          filters: { branches: { only: master } }
      - e2e-against-deployed:
          name: e2e-prod
          base_url: "https://adversary-agent-production.up.railway.app"
          requires: [promote-prod]
          filters: { branches: { only: master } }

  nightly:
    triggers:
      - schedule:
          cron: "0 9 * * *"   # 09:00 UTC = 04:00 CT
          filters: { branches: { only: master } }
    jobs:
      - judge-golden-set
      - red-team-smoke
      - playwright-e2e
