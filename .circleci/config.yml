# CircleCI pipeline for the AgentForge Adversarial AI Security Platform.
#
# The adversary platform is a single-env security tool that continuously
# exercises whichever target the W2 Co-Pilot CI is promoting through
# dev/qa/prod. There is one adversary-agent + one adversary-ui instance
# (dev), so the workflow ends at the validation gate (judge-golden-set +
# red-team-smoke). No qa/prod promotion ladders — the tool itself is
# not the thing being promoted; the targets it tests are.
#
# Master push triggers: unit tests, integration tests, an e2e probe
# against the deployed dev adversary-agent, then the paid LLM
# validation jobs (judge accuracy on a canary corpus, red-team RunPod
# smoke). Railway auto-deploys master.
#
# What this pipeline does NOT do that the W2 one does:
#   - Promote the OpenEMR PHP side (we're a separate app)
#   - Run smoke against an OpenEMR endpoint
#   - Run a 25-case eval suite (we run our own smoke against our own API)
#   - Promote through dev → qa → prod (single-env tool)
#
# See TESTING.md for the full test matrix this pipeline executes.

version: 2.1

orbs:
  node: circleci/node@5

# ─── Executors ──────────────────────────────────────────────────────────
executors:
  python:
    docker:
      - image: cimg/python:3.13
    resource_class: small
  python-with-db:
    docker:
      - image: cimg/python:3.13
      - image: cimg/postgres:16.4
        environment:
          POSTGRES_USER: adversary
          POSTGRES_PASSWORD: adversary
          POSTGRES_DB: adversary_test
    resource_class: small
  node:
    docker:
      - image: cimg/node:lts
    resource_class: small
  playwright:
    docker:
      - image: mcr.microsoft.com/playwright:v1.49.0-noble
    resource_class: medium

# ─── Reusable commands ──────────────────────────────────────────────────
commands:
  wait-for-adversary-sha:
    description: |
      Poll the deployed adversary-agent's /version endpoint until the
      reported git_commit_sha matches $CIRCLE_SHA1 — proves the latest
      push has rolled live before e2e tests fire.

      Tolerant fallback: when /version reports "unknown" (the case for
      services deployed via `railway up` rather than Railway's GitHub-
      source integration, since Railway only populates
      RAILWAY_GIT_COMMIT_SHA for GitHub-source builds), we wait a fixed
      grace window for Railway's redeploy and then pass the step with
      a warning instead of timing out. This keeps the pipeline
      unblocked while the proper fix (configuring GitHub-source on
      adversary-agent + adversary-ui) is in flight.
    parameters:
      base_url:
        type: string
      fallback_grace_s:
        type: integer
        default: 90
    steps:
      - run:
          name: Wait for SHA at << parameters.base_url >>
          command: |
            DEADLINE=$(( $(date +%s) + 240 ))
            SAW_UNKNOWN=0
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              LIVE=$(curl -fsS "<< parameters.base_url >>/version" \
                | jq -r '.git_commit_sha' 2>/dev/null || echo "")
              if [ "$LIVE" = "$CIRCLE_SHA1" ]; then
                echo "✓ Deployed SHA matches: $LIVE"
                exit 0
              fi
              if [ "$LIVE" = "unknown" ]; then
                SAW_UNKNOWN=1
              fi
              echo "  Waiting — deployed: ${LIVE:-?}  want: ${CIRCLE_SHA1:0:7}…"
              sleep 8
            done
            if [ "$SAW_UNKNOWN" = "1" ]; then
              echo "⚠ /version always reported git_commit_sha='unknown' — Railway"
              echo "  isn't populating RAILWAY_GIT_COMMIT_SHA for this service."
              echo "  Sleeping << parameters.fallback_grace_s >>s grace, then proceeding."
              echo "  Fix: configure GitHub-source deploys on the service so Railway"
              echo "  injects RAILWAY_GIT_COMMIT_SHA on every build."
              sleep << parameters.fallback_grace_s >>
              exit 0
            fi
            echo "✗ Timed out waiting for SHA $CIRCLE_SHA1 at << parameters.base_url >>"
            exit 1

  install-python-deps:
    description: pip-install requirements.txt + dev deps
    steps:
      - run:
          name: pip install
          command: |
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-asyncio pytest-cov httpx
            # PyYAML and requests already in requirements.txt

# ─── Jobs ───────────────────────────────────────────────────────────────
jobs:
  # ── Unit + lint
  python-unit-test:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run:
          name: pytest tests/unit + tests/lint
          command: pytest tests/unit tests/lint -v --tb=short

  # ── API integration test (needs Postgres side-car)
  api-integration-test:
    executor: python-with-db
    steps:
      - checkout
      - install-python-deps
      - run:
          name: Wait for Postgres
          command: |
            until pg_isready -h localhost -U adversary; do sleep 1; done
      - run:
          name: pytest tests/integration
          command: |
            export DATABASE_URL="postgresql://adversary:adversary@localhost:5432/adversary_test"
            pytest tests/integration -v --tb=short

  # ── Authz / self-attack probes
  authz-test:
    executor: python-with-db
    steps:
      - checkout
      - install-python-deps
      - run: pytest tests/integration/test_authz.py -v --tb=short

  # ── Smoke campaign (stubbed target, no LLM calls)
  smoke-campaign:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run: pytest tests/smoke/test_smoke_campaign.py -v --tb=short

  # ── UI unit (Vitest)
  ui-unit-test:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          app-dir: ui
          pkg-manager: npm
      - run:
          name: npm run test (Vitest)
          working_directory: ui
          command: npm run test -- --run

  # ── Architecture drift linter
  arch-drift-lint:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run: pytest tests/lint/test_arch_drift.py -v --tb=short

  # ── Red Team smoke — REAL RunPod call (~$0.005)
  red-team-smoke:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run:
          name: 5-seed smoke against RunPod
          command: |
            if [ -z "$RUNPOD_API_KEY" ] || [ -z "$RUNPOD_ENDPOINT" ]; then
              echo "✗ RUNPOD_* env vars missing — see CI project settings"
              exit 1
            fi
            pytest tests/smoke/test_red_team_runpod.py -v --tb=short

  # ── Judge golden set — REAL Haiku call (~$0.20 across 100 cases)
  judge-golden-set:
    executor: python
    steps:
      - checkout
      - install-python-deps
      - run:
          name: 100-case golden set vs current Judge rubric
          command: |
            if [ -z "$ANTHROPIC_API_KEY" ]; then
              echo "✗ ANTHROPIC_API_KEY missing"
              exit 1
            fi
            pytest tests/golden/judge/test_golden.py -v --tb=short

  # ── End-to-end against deployed target (qa or prod)
  e2e-against-deployed:
    executor: python
    parameters:
      base_url:
        type: string
    steps:
      - checkout
      - install-python-deps
      - wait-for-adversary-sha:
          base_url: << parameters.base_url >>
      - run:
          name: 5-attack smoke campaign via real API
          command: |
            export ADVERSARY_BASE_URL="<< parameters.base_url >>"
            pytest tests/smoke/test_e2e_deployed.py -v --tb=short

  # ── Playwright E2E (nightly only)
  playwright-e2e:
    executor: playwright
    steps:
      - checkout
      - node/install-packages:
          app-dir: ui
          pkg-manager: npm
      - run:
          name: Playwright
          working_directory: ui
          command: npx playwright test --reporter=line

# ─── Workflows ──────────────────────────────────────────────────────────
workflows:
  build-test-deploy:
    jobs:
      # Always: fast unit/lint/integration gate on every push
      - python-unit-test
      - api-integration-test
      - authz-test
      - smoke-campaign:
          requires: [python-unit-test]
      - ui-unit-test
      - arch-drift-lint

      # Dev verification (only on master; Railway auto-deploys master)
      - e2e-against-deployed:
          name: e2e-dev
          base_url: "https://adversary-agent-dev.up.railway.app"
          requires:
            - python-unit-test
            - api-integration-test
            - authz-test
            - smoke-campaign
            - ui-unit-test
            - arch-drift-lint
          filters: { branches: { only: master } }

      # Paid LLM tests — verify the security tool's own validators
      # (red-team mutator + dual-judge) against canary corpora.
      - red-team-smoke:
          requires: [e2e-dev]
          filters: { branches: { only: master } }
      - judge-golden-set:
          requires: [e2e-dev]
          filters: { branches: { only: master } }

      # The adversary platform is a single-env security tool, not a
      # tiered application — it runs continuously against whichever
      # target the W2 Co-Pilot CI promotes through dev/qa/prod. There
      # is one adversary-agent + one adversary-ui instance (dev), so
      # the workflow stops at the validation gate. No promote-qa,
      # promote-prod, or e2e-qa/e2e-prod equivalents.

  nightly:
    triggers:
      - schedule:
          cron: "0 9 * * *"   # 09:00 UTC = 04:00 CT
          filters: { branches: { only: master } }
    jobs:
      - judge-golden-set
      - red-team-smoke
      - playwright-e2e
